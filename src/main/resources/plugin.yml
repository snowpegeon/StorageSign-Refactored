name: ${project.artifactId}
main: storagesign.StorageSignPlugin
version: ${project.version}
description: Refactored StorageSign plugin for Spigot/Paper.
api-version: '1.21.4'
authors:
    - hirot
website: https://example.com/storagesign-refactored
license: MIT

commands:
    storagesigngive:
        description: Give a StorageSign item in creative mode.
        usage: /<command> <itemIdentifier> <amount> [signType]
        aliases:
            - ssgive
        permission: storagesign.give

permissions:
    storagesign.*:
        description: Grants all StorageSign permissions.
        default: op
        children:
            storagesign.use: true
            storagesign.craft: true
            storagesign.place: true
            storagesign.break: true
            storagesign.give: true
            storagesign.autocollect: true

    storagesign.use:
        description: Allows using StorageSign interactions.
        default: true

    storagesign.craft:
        description: Allows crafting StorageSign items.
        default: true

    storagesign.place:
        description: Allows placing StorageSign items as signs.
        default: true

    storagesign.break:
        description: Allows breaking StorageSign blocks.
        default: true

    storagesign.give:
        description: Allows using /storagesigngive in creative mode.
        default: op

    storagesign.autocollect:
        description: Allows automatic pickup/import behavior.
        default: true
