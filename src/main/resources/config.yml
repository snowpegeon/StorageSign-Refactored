# StorageSign Configuration
no-permisson: You don't have permission

# Log level: OFF / SEVERE / WARNING / INFO / CONFIG / FINE / FINER / FINEST / ALL
log-level: INFO

# Allow players to manually push/pull items by right-clicking with the matching item
manual-import: true
manual-export: true

# Allow transport blocks (hopper/dropper/dispenser/crafter/hopper minecart) to automatically move items into/out of StorageSigns
auto-import: true
auto-export: true

# Automatically collect dropped items into a held StorageSign
autocollect: true

# Harder crafting recipe (requires Ender Chest instead of a second Chest)
hardrecipe: false

# Maximum items to split per right-click export
divide-limit: 345600
sneak-divide-limit: 34560

# Maximum number of StorageSigns that can be stacked as a single item
max-stack-size: 16

# If true, when a registered StorageSign reaches 0 items it becomes unregistered (Empty).
# If false, registration is kept at 0 and only cleared when the sign itself is broken.
unregister-on-empty: false

# Prevent BUD pulses from breaking adjacent StorageSigns
no-bud: false

# Drop adjacent StorageSigns when a falling block lands on their support block
falling-block-itemSS: false

# Debug: log the raw ItemMeta string for every right-clicked item (very verbose)
banner-debug: false

# Compatibility alias table for identifier parsing.
# Key: identifier token found on sign/lore, Value: current Material name.
# Add entries here to absorb MC rename changes or custom migration aliases without code changes.
item-identifier-aliases:
  SIGN: OAK_SIGN
  ROSE_RED: RED_DYE
  DANDELION_YELLOW: YELLOW_DYE
  CACTUS_GREEN: GREEN_DYE
  OMINOUS_BOTTLE: OMINOUS_BOTTLE
  ENCHBOOK: ENCHANTED_BOOK
  SPOTION: SPLASH_POTION
  LPOTION: LINGERING_POTION
  STONE_SLAB: SMOOTH_STONE_SLAB

# Virtual identifier table.
# Key: identifier text on sign/lore, Value: backing storage representation MATERIAL[:damage].
# Use this for legacy marker identifiers (example: HorseEgg) or server-specific migrations.
virtual-item-identifiers:
  EmptySign: OAK_SIGN:1
  HorseEgg: END_PORTAL:1
